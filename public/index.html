<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Printr</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Mobile header -->
  <header class="mobile-header">
    <button class="menu-toggle" id="menuToggle" aria-label="Open print options">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="logo">
      <svg viewBox="0 0 32 32" class="logo-icon"><rect x="10" y="2" width="12" height="9" rx="1.5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/><rect x="3" y="8" width="26" height="16" rx="3.5" fill="#2563eb"/><rect x="3" y="20" width="26" height="4" fill="#1d4ed8"/><line x1="6" y1="13.5" x2="19" y2="13.5" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="17.5" x2="19" y2="17.5" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/><circle cx="24.5" cy="13.5" r="2.5" fill="#34d399"/><rect x="8" y="20" width="16" height="10" rx="1.5" fill="white" stroke="#e2e8f0" stroke-width="1"/><line x1="11" y1="23.5" x2="21" y2="23.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="26.5" x2="18" y2="26.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span>Printr</span>
    </div>
  </header>

  <div class="app-layout">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg viewBox="0 0 32 32" class="logo-icon"><rect x="10" y="2" width="12" height="9" rx="1.5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/><rect x="3" y="8" width="26" height="16" rx="3.5" fill="#2563eb"/><rect x="3" y="20" width="26" height="4" fill="#1d4ed8"/><line x1="6" y1="13.5" x2="19" y2="13.5" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/><line x1="6" y1="17.5" x2="19" y2="17.5" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/><circle cx="24.5" cy="13.5" r="2.5" fill="#34d399"/><rect x="8" y="20" width="16" height="10" rx="1.5" fill="white" stroke="#e2e8f0" stroke-width="1"/><line x1="11" y1="23.5" x2="21" y2="23.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="26.5" x2="18" y2="26.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Printr</span>
        </div>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-body">
        <h2 class="section-title">Print Options</h2>

        <!-- Printer -->
        <div class="field">
          <label for="printerSelect">Printer</label>
          <div class="select-wrap">
            <select id="printerSelect">
              <option value="">Detecting printers…</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="printer-status" id="printerStatus"></div>
        </div>

        <!-- Copies -->
        <div class="field">
          <label>Copies</label>
          <div class="copies-row">
            <button class="copies-btn" id="copiesMinus" aria-label="Fewer copies">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <input type="number" id="copiesInput" value="1" min="1" max="99" aria-label="Number of copies" />
            <button class="copies-btn" id="copiesPlus" aria-label="More copies">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>

        <!-- Color Mode -->
        <div class="field">
          <label>Color Mode</label>
          <div class="toggle-group" role="group" aria-label="Color mode">
            <button class="toggle-btn active" data-group="colorMode" data-value="color">
              <svg viewBox="0 0 24 24" width="14" height="14">
                <circle cx="12" cy="7" r="5" fill="#f87171"/>
                <circle cx="7" cy="15" r="5" fill="#60a5fa" opacity="0.8"/>
                <circle cx="17" cy="15" r="5" fill="#4ade80" opacity="0.8"/>
              </svg>
              Color
            </button>
            <button class="toggle-btn" data-group="colorMode" data-value="bw">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M12 4v16" stroke-width="1.5"/></svg>
              B&amp;W
            </button>
          </div>
          <input type="hidden" id="colorMode" value="color" />
        </div>

        <!-- Paper Size -->
        <div class="field">
          <label for="paperSize">Paper Size</label>
          <div class="select-wrap">
            <select id="paperSize">
              <option value="letter">Letter  (8.5″ × 11″)</option>
              <option value="legal">Legal  (8.5″ × 14″)</option>
              <option value="A4">A4  (210 × 297 mm)</option>
              <option value="A3">A3  (297 × 420 mm)</option>
              <option value="A5">A5  (148 × 210 mm)</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <!-- Orientation -->
        <div class="field">
          <label>Orientation</label>
          <div class="toggle-group" role="group" aria-label="Orientation">
            <button class="toggle-btn active" data-group="orientation" data-value="portrait">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/></svg>
              Portrait
            </button>
            <button class="toggle-btn" data-group="orientation" data-value="landscape">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/></svg>
              Landscape
            </button>
          </div>
          <input type="hidden" id="orientation" value="portrait" />
        </div>

        <!-- Double-sided -->
        <div class="field">
          <label for="duplex">Double-Sided</label>
          <div class="select-wrap">
            <select id="duplex">
              <option value="none">Single-sided</option>
              <option value="long">Long Edge (Book)</option>
              <option value="short">Short Edge (Flip)</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <!-- Page Range -->
        <div class="field">
          <label for="pageRange">Page Range</label>
          <input type="text" id="pageRange" placeholder="e.g. 1-3, 5, 8-10" autocomplete="off" />
        </div>

        <!-- Quality -->
        <div class="field">
          <label>Quality</label>
          <div class="toggle-group" role="group" aria-label="Print quality">
            <button class="toggle-btn" data-group="quality" data-value="3">Draft</button>
            <button class="toggle-btn active" data-group="quality" data-value="4">Normal</button>
            <button class="toggle-btn" data-group="quality" data-value="5">Best</button>
          </div>
          <input type="hidden" id="quality" value="4" />
        </div>
      </div><!-- /sidebar-body -->
    </aside>

    <!-- Main area -->
    <main class="main">

      <div class="dropzone-wrapper">

        <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Drop file here or click to browse">

          <!-- Empty state -->
          <div class="dz-empty" id="dzEmpty">
            <div class="dz-icon">
              <svg viewBox="0 0 64 64" fill="none">
                <rect x="12" y="8" width="40" height="48" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
                <line x1="22" y1="24" x2="42" y2="24" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="22" y1="32" x2="42" y2="32" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="22" y1="40" x2="34" y2="40" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="46" cy="46" r="12" fill="#2563eb"/>
                <line x1="46" y1="41" x2="46" y2="51" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="41" y1="46" x2="51" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              </svg>
            </div>
            <h2>Drop your file here</h2>
            <p>or <span class="browse-link">click to browse</span></p>
            <div class="formats">
              <span>PDF</span><span>JPG</span><span>PNG</span><span>TXT</span><span>DOCX*</span>
            </div>
            <p class="formats-note">* Requires LibreOffice on the Mac Mini</p>
          </div>

          <!-- File selected state -->
          <div class="dz-file" id="dzFile" hidden>
            <div class="file-icon-wrap" id="fileIconWrap"></div>
            <div class="file-info">
              <p class="file-name" id="fileName"></p>
              <p class="file-meta" id="fileMeta"></p>
            </div>
            <button class="file-clear" id="fileClear" aria-label="Remove file">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <!-- Drag active overlay -->
          <div class="dz-drag-overlay" id="dzDragOverlay">
            <svg viewBox="0 0 64 64" fill="none"><path d="M32 12 L32 44 M18 30 L32 44 L46 30" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="12" y="48" width="40" height="6" rx="3" fill="white" opacity="0.6"/></svg>
            <p>Release to select</p>
          </div>
        </div>

        <input type="file" id="fileInput" hidden accept=".pdf,.jpg,.jpeg,.png,.gif,.tiff,.tif,.bmp,.webp,.txt,.doc,.docx,.odt,.ppt,.pptx,.xls,.xlsx" />

        <!-- Print button -->
        <button class="print-btn" id="printBtn" disabled>
          <span class="print-btn-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          </span>
          <span class="print-btn-label">Print</span>
          <span class="print-spinner" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9" stroke-opacity="0.25"/><path d="M12 3 A9 9 0 0 1 21 12" stroke-linecap="round"/></svg>
          </span>
        </button>

        <!-- Progress bar -->
        <div class="progress-wrap" id="progressWrap" hidden>
          <div class="progress-bar" id="progressBar"></div>
        </div>

      </div><!-- /dropzone-wrapper -->
    </main>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
