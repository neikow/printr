<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- paper input (top) -->
  <rect x="10" y="2" width="12" height="9" rx="1.5" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <!-- printer body -->
  <rect x="3" y="8" width="26" height="16" rx="3.5" fill="#2563eb"/>
  <!-- body shadow line -->
  <rect x="3" y="20" width="26" height="4" rx="0" fill="#1d4ed8"/>
  <rect x="3" y="20" width="26" height="4" rx="0" fill="#1d4ed8" opacity="0.5"/>
  <!-- vent lines -->
  <line x1="6" y1="13.5" x2="19" y2="13.5" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="17.5" x2="19" y2="17.5" stroke="#1d4ed8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- status light -->
  <circle cx="24.5" cy="13.5" r="2.5" fill="#34d399"/>
  <!-- output tray -->
  <rect x="8" y="20" width="16" height="10" rx="1.5" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- output paper lines -->
  <line x1="11" y1="23.5" x2="21" y2="23.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="26.5" x2="18" y2="26.5" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
